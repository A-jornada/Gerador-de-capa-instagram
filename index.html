  body { background: #0d0d1a; font-family: 'Quicksand', sans-serif; color: #fff; min-height: 100vh; padding: 1.5rem 1rem 2rem; display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(151,231,0,0.7); font-weight: 600; margin-bottom: 1.5rem; }
  .layout { display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 700px; }
  .controls { flex: 1; min-width: 240px; max-width: 320px; }
  .ctrl-group { margin-bottom: 1.25rem; }
  .ctrl-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  textarea {
    width: 100%; min-height: 90px; resize: vertical;
    font-family: 'Quicksand', sans-serif; font-size: 15px; font-weight: 700;
    padding: 10px 12px; border-radius: 10px; line-height: 1.4;
    border: 0.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: #fff;
  }
  textarea::placeholder { color: rgba(255,255,255,0.2); font-weight: 400; }
  textarea:focus { outline: none; border-color: rgba(151,231,0,0.5); }
  input[type=number] {
    width: 80px; font-family: 'Space Mono', monospace; font-size: 14px;
    text-align: center; padding: 8px; border-radius: 8px;
    border: 0.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: #97e700;
  }
  input[type=number]:focus { outline: none; border-color: rgba(151,231,0,0.5); }
  .day-row { display: flex; align-items: center; gap: 8px; }
  .day-note { font-size: 11px; color: rgba(255,255,255,0.3); }
  .toggle-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .tog {
    padding: 6px 16px; border-radius: 6px; font-size: 12px; cursor: pointer;
    border: 0.5px solid rgba(255,255,255,0.15); background: transparent;
    color: rgba(255,255,255,0.4); font-family: 'Quicksand', sans-serif; font-weight: 600;
    transition: all 0.15s;
  }
  .tog.active { background: rgba(151,231,0,0.1); color: #97e700; border-color: rgba(151,231,0,0.4); }
  .divider { height: 0.5px; background: rgba(255,255,255,0.07); margin: 1rem 0; }
  .handle-input {
    width: 100%; padding: 8px 12px; border-radius: 8px; font-size: 13px;
    border: 0.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6);
    font-family: 'Space Mono', monospace;
  }
  .handle-input:focus { outline: none; border-color: rgba(151,231,0,0.5); }

  /* PREVIEW */
  .preview-col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .preview-label { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; align-self: flex-start; }
  .phone {
    width: 200px; height: 355px;
    background: #11111f; border-radius: 18px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    justify-content: center; align-items: stretch;
    padding: 20px 18px;
    border: 0.5px solid rgba(151,231,0,0.1);
  }
  .phone.light { background: #F5F5F0; border-color: rgba(0,0,0,0.08); }
  .phone.green { background: #97e700; border-color: transparent; }

  .center-block { display: flex; flex-direction: column; gap: 10px; align-items: stretch; }

  .badge { display: flex; flex-direction: column; gap: 0; align-items: center; text-align: center; }
  .badge-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px; color: rgba(151,231,0,0.6); font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .badge-number {
    font-family: 'Space Mono', monospace;
    font-size: 54px; font-weight: 700; color: #97e700;
    line-height: 1; letter-spacing: -2px;
  }
  .phone.light .badge-label { color: rgba(17,17,31,0.45); }
  .phone.light .badge-number { color: #11111f; }
  .phone.green .badge-label { color: rgba(0,0,0,0.45); }
  .phone.green .badge-number { color: #11111f; }

  .day-divider { height: 0.5px; background: rgba(151,231,0,0.2); width: 100%; }
  .phone.light .day-divider { background: rgba(17,17,31,0.12); }
  .phone.green .day-divider { background: rgba(0,0,0,0.15); }

  .gancho-text {
    font-family: 'Quicksand', sans-serif; font-size: 15px; font-weight: 700;
    color: #fff; line-height: 1.25; word-break: break-word;
    transition: font-size 0.15s;
  }
  .gancho-text.small { font-size: 10px; }
  .gancho-text.medium { font-size: 15px; }
  .gancho-text.large { font-size: 20px; }
  .phone.light .gancho-text { color: #11111f; }
  .phone.green .gancho-text { color: #11111f; }

  .badge-number { transition: font-size 0.15s; }
  .badge-number.small { font-size: 32px; }
  .badge-number.medium { font-size: 54px; }
  .badge-number.large { font-size: 68px; }

  .handle-display { transition: font-size 0.15s; }
  .handle-display.small { font-size: 5px; }
  .handle-display.medium { font-size: 6.5px; }
  .handle-display.large { font-size: 9px; }

  .handle-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 4px; }
  .handle-display { font-family: 'Space Mono', monospace; font-size: 6.5px; color: rgba(255,255,255,0.35); }
  .phone.light .handle-display { color: rgba(17,17,31,0.4); }
  .phone.green .handle-display { color: rgba(0,0,0,0.4); }

  .hint { font-size: 10px; color: rgba(255,255,255,0.2); line-height: 1.5; text-align: center; max-width: 200px; }
  .dl-btn {
    width: 100%; max-width: 200px; padding: 10px;
    background: rgba(151,231,0,0.1); border: 0.5px solid rgba(151,231,0,0.3);
    border-radius: 10px; color: rgba(151,231,0,0.8);
    font-family: 'Quicksand', sans-serif; font-size: 13px; font-weight: 600;
    text-align: center; cursor: pointer; letter-spacing: 0.02em;
  }
  .dl-btn:active { opacity: 0.7; }
  .footer-hint { text-align: center; margin-top: 1.5rem; font-size: 9px; color: rgba(255,255,255,0.12); }
</style>
</head>
<body>
<h1>🌵 Gerador de Capa — @visancarelli</h1>

<div class="layout">
  <div class="controls">
    <div class="ctrl-group">
      <label class="ctrl-label">Texto do gancho</label>
      <textarea id="gancho" placeholder="Digite o gancho do seu Reel...">Você não precisa se diminuir pra caber</textarea>
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label">Dia da jornada</label>
      <div class="day-row">
        <input type="number" id="dayInput" min="1" max="1826">
        <span class="day-note">de 1.826 dias</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="ctrl-group">
      <label class="ctrl-label">Fundo</label>
      <div class="toggle-row">
        <button class="tog active" onclick="setTheme('dark',this)">Escuro</button>
        <button class="tog" onclick="setTheme('light',this)">Claro</button>
        <button class="tog" onclick="setTheme('green',this)">Verde</button>
      </div>
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label">Tamanho do número</label>
      <div class="toggle-row">
        <button class="tog" onclick="setSize('number','small',this)">P</button>
        <button class="tog active" onclick="setSize('number','medium',this)">M</button>
        <button class="tog" onclick="setSize('number','large',this)">G</button>
      </div>
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label">Tamanho da frase</label>
      <div class="toggle-row">
        <button class="tog" onclick="setSize('gancho','small',this)">P</button>
        <button class="tog active" onclick="setSize('gancho','medium',this)">M</button>
        <button class="tog" onclick="setSize('gancho','large',this)">G</button>
      </div>
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label">Tamanho do IG</label>
      <div class="toggle-row">
        <button class="tog" onclick="setSize('handle','small',this)">P</button>
        <button class="tog active" onclick="setSize('handle','medium',this)">M</button>
        <button class="tog" onclick="setSize('handle','large',this)">G</button>
      </div>
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label">Seu arroba</label>
      <input type="text" class="handle-input" id="handleInput" value="@visancarelli">
    </div>
  </div>

  <div class="preview-col">
    <div class="preview-label">Preview</div>
    <div class="phone" id="phone">
      <div class="center-block">
        <div class="badge">
          <div class="badge-label">DIA</div>
          <div class="badge-number medium" id="badgeEl">—</div>
        </div>
        <div class="day-divider"></div>
        <div class="gancho-text medium" id="ganchoEl">Você não precisa se diminuir pra caber</div>
        <div class="handle-row">
          <div class="handle-display medium" id="handleEl">@visancarelli</div>
          <div style="font-size:12px">🌵</div>
        </div>
      </div>
    </div>
    <div class="hint">Ajuste o texto e baixe a capa pronta</div>
    <button class="dl-btn" id="dlBtn" onclick="baixarCapa()">Baixar capa</button>
  </div>
</div>

<div class="footer-hint">O dia é calculado automaticamente toda vez que você abrir.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function(){
  var start=new Date(2024,9,15), now=new Date(); now.setHours(0,0,0,0);
  var elapsed=Math.floor((now-start)/864e5);
  elapsed=Math.max(1,Math.min(elapsed,1826));
  document.getElementById('dayInput').value=elapsed;
  document.getElementById('badgeEl').textContent=elapsed;
})();

document.getElementById('gancho').addEventListener('input',function(){
  document.getElementById('ganchoEl').textContent=this.value||'Seu gancho aqui';
});
document.getElementById('dayInput').addEventListener('input',function(){
  document.getElementById('badgeEl').textContent=(this.value||'—');
});
document.getElementById('handleInput').addEventListener('input',function(){
  document.getElementById('handleEl').textContent=this.value||'@visancarelli';
});

var currentTheme = 'dark';
function setTheme(t,btn){
  document.querySelectorAll('.tog').forEach(function(b){
    if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes('setTheme')) b.classList.remove('active');
  });
  btn.classList.add('active');
  var phone=document.getElementById('phone');
  phone.classList.remove('dark','light','green');
  phone.classList.add(t);
  currentTheme = t;
}
function setSize(target,s,btn){
  var attr = "setSize('"+target+"'";
  document.querySelectorAll('.tog').forEach(function(b){
    if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes(attr)) b.classList.remove('active');
  });
  btn.classList.add('active');
  var ids = {number:'badgeEl', gancho:'ganchoEl', handle:'handleEl'};
  var el = document.getElementById(ids[target]);
  el.classList.remove('small','medium','large');
  el.classList.add(s);
}
function baixarCapa(){
  var btn=document.getElementById('dlBtn');
  btn.textContent='Gerando...';
  btn.style.opacity='0.6';
  var phone=document.getElementById('phone');
  html2canvas(phone,{scale:6,useCORS:true,backgroundColor:null}).then(function(canvas){
    var link=document.createElement('a');
    var dia=document.getElementById('dayInput').value||'xxx';
    link.download='capa-dia-'+dia+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    btn.textContent='Baixar capa';
    btn.style.opacity='1';
  });
}
</script>
</body>
</html>
